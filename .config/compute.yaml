# =============================================================================
# AVM – Compute domain
#
# Resource modules: VM, VMSS, Disk, Disk Encryption Set, Gallery, SSH Key,
#                   Host Group, Proximity Placement Group, Capacity Reservation
# Pattern modules:  (none in scope)
# Utility modules:  Linux/Windows VM AzAPI replicators, VMSS AzAPI replicator
# =============================================================================

domain: compute
description: Virtual machines, scale sets, disks, and compute infrastructure

modules:

  # ---------------------------------------------------------------------------
  # Resource modules
  # ---------------------------------------------------------------------------

  - name: terraform-azurerm-avm-res-compute-virtualmachine
    type: res
    url: https://github.com/Azure/terraform-azurerm-avm-res-compute-virtualmachine.git
    branch: main
    description: Virtual Machine

  - name: terraform-azurerm-avm-res-compute-virtualmachinescaleset
    type: res
    url: https://github.com/Azure/terraform-azurerm-avm-res-compute-virtualmachinescaleset.git
    branch: main
    description: Virtual Machine Scale Set

  - name: terraform-azurerm-avm-res-compute-disk
    type: res
    url: https://github.com/Azure/terraform-azurerm-avm-res-compute-disk.git
    branch: main
    description: Managed Disk

  - name: terraform-azurerm-avm-res-compute-diskencryptionset
    type: res
    url: https://github.com/Azure/terraform-azurerm-avm-res-compute-diskencryptionset.git
    branch: main
    description: Disk Encryption Set

  - name: terraform-azurerm-avm-res-compute-gallery
    type: res
    url: https://github.com/Azure/terraform-azurerm-avm-res-compute-gallery.git
    branch: main
    description: Azure Compute Gallery

  - name: terraform-azurerm-avm-res-compute-sshpublickey
    type: res
    url: https://github.com/Azure/terraform-azurerm-avm-res-compute-sshpublickey.git
    branch: main
    description: SSH Public Key

  - name: terraform-azurerm-avm-res-compute-hostgroup
    type: res
    url: https://github.com/Azure/terraform-azurerm-avm-res-compute-hostgroup.git
    branch: main
    description: Dedicated Host Group

  - name: terraform-azurerm-avm-res-compute-proximityplacementgroup
    type: res
    url: https://github.com/Azure/terraform-azurerm-avm-res-compute-proximityplacementgroup.git
    branch: main
    description: Proximity Placement Group

  - name: terraform-azurerm-avm-res-compute-capacityreservationgroup
    type: res
    url: https://github.com/Azure/terraform-azurerm-avm-res-compute-capacityreservationgroup.git
    branch: main
    description: Capacity Reservation Group

  # ---------------------------------------------------------------------------
  # Utility modules
  # ---------------------------------------------------------------------------

  - name: terraform-azurerm-avm-utl-compute-linuxvirtualmachine-azapi-replicator
    type: utl
    url: https://github.com/Azure/terraform-azurerm-avm-utl-compute-linuxvirtualmachine-azapi-replicator.git
    branch: main
    description: Linux VM AzRM → AzAPI replicator

  - name: terraform-azurerm-avm-utl-compute-windowsvirtualmachine-azapi-replicator
    type: utl
    url: https://github.com/Azure/terraform-azurerm-avm-utl-compute-windowsvirtualmachine-azapi-replicator.git
    branch: main
    description: Windows VM AzRM → AzAPI replicator

  - name: terraform-azurerm-avm-utl-compute-orchestratedvirtualmachinescaleset-azapi-replicator
    type: utl
    url: https://github.com/Azure/terraform-azurerm-avm-utl-compute-orchestratedvirtualmachinescaleset-azapi-replicator.git
    branch: main
    description: VMSS AzRM → AzAPI replicator
