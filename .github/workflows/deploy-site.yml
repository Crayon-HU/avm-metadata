name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "data/modules/**"
      - "data/resources/**"
      - "data/datasources/**"
      - "data/activity*.json"
      - "scripts/generate_site.py"
      - "scripts/sitegen/**"
      - "scripts/activity.py"
      - "avm.sh"
      - ".github/workflows/deploy-site.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # Uncomment with the Pagefind indexing step when search should be built in CI.
      # - name: Set up Node.js
      #   uses: actions/setup-node@49933ea5288caeca8642195f882787471b1b7cca # v4.4.0
      #   with:
      #     node-version: "22"

      - name: Generate static portal
        run: python3 scripts/generate_site.py --output-dir _site --validate

      # Pagefind is optional progressive enhancement; generated pages work without it.
      # When enabling this, add --pagefind to the Generate static portal step.
      # - name: Build Pagefind search index
      #   run: npx --yes pagefind@latest --site _site/

      - name: Validate site output
        run: |
          if [ ! -s _site/index.html ]; then
            echo "::error::Site generation failed; _site/index.html is missing or empty"
            exit 1
          fi
          find _site -maxdepth 1 -name "*.html" -print

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
