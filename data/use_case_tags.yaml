# ---------------------------------------------------------------------------
# Tier 3 — specific Terraform resource names → extra tags
# Only map non-helper, high-signal resources. See 'ignore' list below.
# ---------------------------------------------------------------------------
resources:
  azurerm_kubernetes_cluster:           [containers, aks]
  azurerm_container_registry:           [containers, image-management]
  azurerm_log_analytics_workspace:      [monitoring, log-analytics]
  azurerm_application_insights:         [monitoring, apm]
  azurerm_key_vault:                    [security, secrets]
  azurerm_user_assigned_identity:       [identity]
  azurerm_virtual_network:              [networking, connectivity]
  azurerm_subnet:                       [networking, connectivity]
  azurerm_network_security_group:       [security, networking]
  azurerm_firewall:                     [security, firewall]
  azurerm_application_gateway:          [load-balancing, api-gateway]
  azurerm_private_endpoint:             [security, private-connectivity]
  azurerm_storage_account:              [storage]
  azurerm_cosmosdb_account:             [data, nosql]
  azurerm_linux_virtual_machine:        [compute, iaas]
  azurerm_windows_virtual_machine:      [compute, iaas]
  azurerm_mssql_server:                 [data, sql]
  azurerm_mssql_managed_instance:       [data, sql, lift-and-shift]
  azurerm_postgresql_flexible_server:   [data, postgresql]
  azurerm_mysql_flexible_server:        [data, mysql]
  azurerm_redis_cache:                  [data, cache]
  azurerm_eventhub_namespace:           [messaging, streaming]
  azurerm_servicebus_namespace:         [messaging, integration]
  azurerm_data_factory:                 [data, etl, integration]
  azurerm_automation_account:           [automation, management]
  azurerm_api_management:               [api-gateway, web]
  azurerm_cdn_frontdoor_profile:        [cdn, web]
  azurerm_search_service:               [ai-ml, search]
  azurerm_cognitive_account:            [ai-ml]
  azurerm_backup_protected_vm:          [bcdr, backup]
  azurerm_recovery_services_vault:      [bcdr, backup]
  azuread_directory_role:               [identity, security]
  azuread_directory_role_assignment:    [identity, rbac]

# Resources to always skip — they appear in almost every module as helpers
# and carry no use-case signal.
ignore:
  - azurerm_role_assignment
  - azurerm_management_lock
  - azurerm_monitor_diagnostic_setting
  - azurerm_resource_group
  - azurerm_subscription
  - azapi_resource
  - azapi_update_resource
  - azapi_resource_action
  - azapi_resource_list
  - azapi_client_config
  - azurerm_client_config
  - modtm_telemetry
  - random_uuid
  - random_string
  - random_password
