# use_case_tags.yaml — Use-case tag lookup for avm tag command.
#
# Used by scripts/tag_use_cases.py to infer analysis_use_cases tags from catalog metadata.
# Operator-maintained: add/edit entries freely.
#
# Tag vocabulary (functional v1):
#   networking, connectivity, security, compute, containers, data, storage,
#   messaging, monitoring, identity, ai-ml, web, automation, management,
#   platform, avd, hybrid, iot, bcdr, devtools, cdn, api-gateway
#
# Three tiers (applied in order, results merged):
#   1. domains:          catalog.domain → base tags (all module types)
#   2. resource_types:   "{provider_namespace}/{resource_type}" → extra tags (res modules only)
#   3. resources:        azurerm_*/azapi_*/azuread_* resource names → extra tags (from resources_managed)
#      (helper resources below are IGNORED — they appear in almost every module)

# ---------------------------------------------------------------------------
# Tier 1 — Domain → base tags
# ---------------------------------------------------------------------------
domains:
  networking:         [networking, connectivity]
  compute:            [compute, infrastructure]
  containers:         [containers, cloud-native]
  data-databases:     [data, databases]
  monitoring:         [monitoring, observability]
  identity-security:  [security, identity]
  web-app-services:   [web, application]
  storage:            [storage]
  management:         [management, governance]
  platform-alz:       [platform, landing-zone, alz]
  avd:                [avd, virtual-desktop]
  hybrid:             [hybrid, arc]
  iot:                [iot]
  ai-ml:              [ai-ml, machine-learning]
  recovery-bcdr:      [bcdr, recovery]
  developer-tools:    [devtools]
  other:              []

# ---------------------------------------------------------------------------
# Tier 2 — provider_namespace/resource_type → extra tags
# Key format: "Microsoft.Namespace/resourceTypes" (case-sensitive, matches catalog values)
# ---------------------------------------------------------------------------
resource_types:
