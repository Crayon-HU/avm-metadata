  Microsoft.Network/virtualNetworks:                    [hub-spoke, landing-zone]
  Microsoft.Network/networkSecurityGroups:              [security, zero-trust]
  Microsoft.Network/azureFirewalls:                     [security, firewall, zero-trust]
  Microsoft.Network/firewallPolicies:                   [security, firewall]
  Microsoft.Network/applicationGateways:                [security, load-balancing, api-gateway]
  Microsoft.Network/ApplicationGatewayWebApplicationFirewallPolicies: [security, waf]
  Microsoft.Network/frontDoorWebApplicationFirewallPolicies: [security, waf, cdn]
  Microsoft.Network/bastionHosts:                       [security, remote-access]
  Microsoft.Network/privateEndpoints:                   [security, private-connectivity, zero-trust]
  Microsoft.Network/privateDnsZones:                    [private-connectivity, dns]
  Microsoft.Network/dnsZones:                           [dns]
  Microsoft.Network/dnsResolvers:                       [dns, private-connectivity]
  Microsoft.Network/loadBalancers:                      [load-balancing]
  Microsoft.Network/natGateways:                        [connectivity, egress]
  Microsoft.Network/expressRouteCircuits:               [hybrid, connectivity, expressroute]
  Microsoft.Network/connections:                        [hybrid, connectivity, vpn]
  Microsoft.Network/localNetworkGateways:               [hybrid, connectivity, vpn]
  Microsoft.Network/ddosProtectionPlans:                [security, ddos]
  Microsoft.Network/publicIPAddresses:                  [connectivity]
  Microsoft.Network/publicIPPrefixes:                   [connectivity]
  Microsoft.Network/routeTables:                        [connectivity, routing]
  Microsoft.Network/networkManagers:                    [management, networking]
  Microsoft.Network/networkWatchers:                    [monitoring, networking]
  Microsoft.Network/trafficmanagerprofiles:             [load-balancing, global-routing]
  Microsoft.Network/networkInterfaces:                  [compute, infrastructure]
  Microsoft.Network/applicationSecurityGroups:          [security]
  Microsoft.Network/ipGroups:                           [security, firewall]

  # Compute
  Microsoft.Compute/virtualMachines:                    [compute, iaas]
  Microsoft.Compute/virtualMachineScaleSets:            [compute, iaas, autoscale]
  Microsoft.Compute/disks:                              [compute, storage, iaas]
  Microsoft.Compute/diskEncryptionSets:                 [security, encryption]
  Microsoft.Compute/galleries:                          [compute, image-management]
  Microsoft.Compute/hostGroups:                         [compute, dedicated-hosts, isolation]
